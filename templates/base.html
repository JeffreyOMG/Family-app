<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Familia App{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head %}{% endblock %}
</head>

<body data-page="{% block page %}dashboard{% endblock %}"
      data-seccion="{{ seccion_activa if seccion_activa is defined else 'inicio' }}"
      data-rol="{{ usuario.rol if usuario is defined else 'invitado' }}">

  {% include 'partials/loader.html' %}


    {% include 'partials/sidebar.html' %}

  <div class="layout">
    {% include 'partials/navbar.html' %}
    <div id="overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- TOAST container -->
  <div id="toast-container"></div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
