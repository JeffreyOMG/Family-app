<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Familia App{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='icono/icono.ico') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/video-player.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-glass.css') }}"/>
  {% block head %}{% endblock %}
  <!-- Anti-flash: aplicar tema y acento antes de pintar la página -->
  <script>
    (function(){
      // Tema
      if(localStorage.getItem('theme')==='dark'){
        document.documentElement.style.colorScheme='dark';
      } else {
        document.documentElement.classList.remove('dark-mode-pre');
      }
      // Acento: función mínima para el head (la completa está en dashboard.js)
      var hex = localStorage.getItem('accent') || '#ff4d8d';
      try {
        var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        var lr=Math.min(255,Math.round(r+(255-r)*.30)),lg=Math.min(255,Math.round(g+(255-g)*.30)),lb=Math.min(255,Math.round(b+(255-b)*.30));
        var dr=Math.round(r*.75),dg=Math.round(g*.75),db=Math.round(b*.75);
        var toHex=function(n){return n.toString(16).padStart(2,'0');};
        var hov='#'+toHex(lr)+toHex(lg)+toHex(lb), drk='#'+toHex(dr)+toHex(dg)+toHex(db);
        var s=document.documentElement.style;
        s.setProperty('--accent',hex);
        s.setProperty('--accent-2',drk);
        s.setProperty('--accent-hover',hov);
        s.setProperty('--accent-soft','rgba('+r+','+g+','+b+',.15)');
        s.setProperty('--accent-border','rgba('+r+','+g+','+b+',.40)');
        s.setProperty('--accent-shadow','0 4px 16px rgba('+r+','+g+','+b+',.40)');
        if(hex.toLowerCase()==='#ff4d8d'){
          s.setProperty('--accent-gradient','linear-gradient(135deg,#ff6b9d 0%,#ff4d8d 35%,#e0386f 70%,#c9236a 100%)');
        } else {
          s.setProperty('--accent-gradient','linear-gradient(135deg,'+hov+' 0%,'+hex+' 45%,'+drk+' 100%)');
        }
        s.setProperty('--btn-bg',hex);
      } catch(e){}
    })();
  </script>
  <!-- ── Helper Cloudinary: transforma URLs para imágenes optimizadas ── -->
  <script>
  (function(){
    var _CL = {{ CL_PRESETS_JS | safe }};
    /**
     * clUrl(url, preset) → URL con transformaciones de Cloudinary insertadas.
     * Presets: 'avatar', 'avatar_md', 'avatar_lg', 'cover', 'feed',
     *          'gallery', 'comp_thumb', 'comp_full', 'poll_opt', 'carousel', 'compress'
     */
    window.clUrl = function(url, preset) {
      if (!url || url.indexOf('cloudinary.com') === -1 || url.indexOf('image/upload') === -1) return url || '';
      var t = _CL[preset] || _CL['feed'];
      var marker = t.split(',')[0];
      if (url.indexOf('/upload/' + marker) !== -1) return url;
      return url.replace('/image/upload/', '/image/upload/' + t + '/');
    };
  })();
  </script>
</head>

<body data-page="{% block page %}dashboard{% endblock %}"
      data-seccion="{{ seccion_activa if seccion_activa is defined else 'inicio' }}"
      data-rol="{{ usuario.rol if usuario is defined else 'invitado' }}">

  {% include 'partials/loader.html' %}


    {% include 'partials/sidebar.html' %}

  <div class="layout">
    {% include 'partials/navbar.html' %}
    <div id="overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- TOAST container -->
  <div id="toast-container"></div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/video-player.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
