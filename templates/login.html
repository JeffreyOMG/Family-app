<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Familia App — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --border: #dbdbdb;
      --text: #262626;
      --text2: #737373;
      --text3: #c7c7c7;
      --accent: #0095f6;
      --btn-bg: #0095f6;
      --btn-dis: #b2dffc;
      --font: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* LAYOUT */
    .ig-wrapper {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ig-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 40px 40px 24px;
    }

    /* BRAND */
    .ig-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .ig-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      margin-bottom: 16px;
    }
    .ig-logo .material-symbols-outlined {
      font-size: 34px;
      color: #fff;
      font-variation-settings: 'FILL' 1;
    }
    .ig-brand-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text);
      line-height: 1;
    }
    .ig-brand-sub {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    /* ALERT */
    .ig-alert {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .ig-alert .material-symbols-outlined { font-size: 16px; }

    /* FORM */
    .ig-form { display: flex; flex-direction: column; gap: 6px; }

    .ig-input-wrap {
      position: relative;
    }
    .ig-input-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text3);
      font-size: 18px;
      font-variation-settings: 'FILL' 0;
    }
    .ig-input {
      width: 100%;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 42px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .ig-input::placeholder { color: var(--text3); font-size: 12px; }
    .ig-input:focus { border-color: #a8a8a8; }

    .ig-toggle-pass {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: color .15s;
    }
    .ig-toggle-pass:hover { color: var(--text); }
    .ig-toggle-pass .material-symbols-outlined { font-size: 18px; }

    /* FORGOT */
    .ig-forgot {
      text-align: right;
      margin-top: 2px;
    }
    .ig-forgot a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    /* DIVIDER */
    .ig-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 14px 0;
    }
    .ig-divider::before, .ig-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .ig-divider span {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .5px;
    }

    /* BOTÓN SUBMIT */
    .ig-btn {
      width: 100%;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }
    .ig-btn:hover { opacity: .88; }
    .ig-btn:disabled { background: var(--btn-dis); cursor: not-allowed; }

    /* BOTTOM CARD */
    .ig-bottom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--text2);
    }
    .ig-bottom a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      margin-left: 4px;
    }
    .ig-bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="ig-wrapper">
  <div class="ig-card">

    <div class="ig-brand">
      <div class="ig-logo">
        <span class="material-symbols-outlined">home</span>
      </div>
      <div class="ig-brand-name">FAMILIA</div>
      <div class="ig-brand-sub">Salida de Fin de Año 2025</div>
    </div>

    {% if error %}
    <div class="ig-alert">
      <span class="material-symbols-outlined">warning</span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="ig-form">
      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">person</span>
        <input name="usuario" type="text" class="ig-input" placeholder="Usuario" required autocomplete="username"/>
      </div>

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">lock</span>
        <input name="password" id="pass" type="password" class="ig-input" placeholder="Contraseña" required autocomplete="current-password"/>
        <button type="button" class="ig-toggle-pass" onclick="togglePass(this)" aria-label="Ver contraseña">
          <span class="material-symbols-outlined" id="pass-eye-icon">visibility_off</span>
        </button>
      </div>

      <button type="submit" class="ig-btn">Entrar</button>
    </form>

  </div>

  <div class="ig-bottom">
    ¿No tienes cuenta?<a href="/registro">Regístrate</a>
  </div>
</div>

<script>
function togglePass(btn) {
  const inp  = document.getElementById('pass');
  const icon = document.getElementById('pass-eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.textContent = 'visibility';
  } else {
    inp.type = 'password';
    icon.textContent = 'visibility_off';
  }
}
</script>
</body>
</html>
