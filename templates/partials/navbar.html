<!-- SCROLL GLASS EFFECT — Solo móvil -->
<script>
(function() {
  function initScrollGlass() {
    var navbar = document.getElementById('main-navbar');
    if (!navbar) return;
    if (window.innerWidth > 768) return;

    var threshold = 20;
    var ticking = false;

    function applyScrollClass(scrollTop) {
      if (scrollTop > threshold) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }

    function onScroll() {
      if (!ticking) {
        requestAnimationFrame(function() {
          // Try multiple scroll sources
          var mainContent = document.querySelector('.main-content');
          var scrollTop = 0;
          if (mainContent && mainContent.scrollTop > 0) {
            scrollTop = mainContent.scrollTop;
          } else {
            scrollTop = window.scrollY || document.documentElement.scrollTop;
          }
          applyScrollClass(scrollTop);
          ticking = false;
        });
        ticking = true;
      }
    }

    // Listen on both possible scrollers
    var mainContent = document.querySelector('.main-content');
    if (mainContent) {
      mainContent.addEventListener('scroll', onScroll, { passive: true });
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    document.addEventListener('scroll', onScroll, { passive: true });

    // Initial state
    onScroll();
  }

  // Run after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initScrollGlass);
  } else {
    initScrollGlass();
  }
  // Also run after a delay to catch late-mounted containers
  setTimeout(initScrollGlass, 300);
})();
</script>
