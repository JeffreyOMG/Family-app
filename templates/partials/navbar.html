<!-- SCROLL GLASS EFFECT — Solo móvil -->
<script>
(function() {
  function initScrollGlass() {
    var navbar = document.getElementById('main-navbar');
    if (!navbar) return;

    // El scroll container en móvil puede ser .main-content o window
    var scroller = document.querySelector('.main-content') || window;
    var threshold = 24; // px de scroll antes de activar el glass

    function onScroll() {
      var scrollTop = scroller === window
        ? window.scrollY
        : scroller.scrollTop;
      if (scrollTop > threshold) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }

    // Solo en móvil
    if (window.innerWidth <= 768) {
      scroller.addEventListener('scroll', onScroll, { passive: true });
      onScroll(); // estado inicial
    }

    // Re-init si cambia tamaño
    window.addEventListener('resize', function() {
      if (window.innerWidth <= 768) {
        scroller.addEventListener('scroll', onScroll, { passive: true });
      } else {
        navbar.classList.remove('scrolled');
        scroller.removeEventListener('scroll', onScroll);
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initScrollGlass);
  } else {
    initScrollGlass();
    // re-try after a tick in case main-content isn't mounted yet
    setTimeout(initScrollGlass, 120);
  }
})();
</script>
