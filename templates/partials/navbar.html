<!-- ══ NOTIFICACIONES CSS ════════════════════════════════════════════════════ -->
<style>
/* ── Bell button ── */
.notif-bell-btn { position: relative; }
.notif-badge {
  position: absolute; top: 2px; right: 2px;
  min-width: 18px; height: 18px; border-radius: 9px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; line-height: 18px;
  text-align: center; padding: 0 4px;
  pointer-events: none;
  animation: notif-pop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes notif-pop { from { transform: scale(0); } to { transform: scale(1); } }

/* ── Panel ── */
.notif-panel {
  position: fixed;
  top: 60px; right: 12px;
  width: min(380px, calc(100vw - 24px));
  max-height: min(540px, calc(100vh - 80px));
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  z-index: 1099;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: notif-panel-in .22s cubic-bezier(.34,1.3,.64,1);
  color: var(--text);
}
/* Modo oscuro: sombra más pronunciada */
body.dark-mode .notif-panel {
  box-shadow: 0 8px 40px rgba(0,0,0,.55);
}
@keyframes notif-panel-in {
  from { opacity:0; transform: translateY(-8px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Header ── */
.notif-panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.notif-panel-header h3 {
  flex: 1; margin: 0; font-size: 15px; font-weight: 700;
  color: var(--text);
}
.notif-mark-all, .notif-close-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text2); padding: 5px; border-radius: 8px;
  display: flex; align-items: center; transition: background .15s, color .15s;
}
.notif-mark-all:hover { color: var(--accent); background: var(--accent-soft); }
.notif-close-btn:hover { color: var(--text); background: var(--bg2); }
.notif-mark-all .material-symbols-outlined,
.notif-close-btn .material-symbols-outlined { font-size: 20px; }

/* ── Lista ── */
.notif-lista { overflow-y: auto; flex: 1; padding: 4px 0; background: var(--card); }
.notif-lista::-webkit-scrollbar { width: 4px; }
.notif-lista::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.notif-loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 36px 20px; color: var(--text3);
}
.notif-loading .material-symbols-outlined { font-size: 28px; opacity: .5; }
.notif-vacio {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-size: 13px;
}
.notif-vacio .material-symbols-outlined {
  font-size: 40px; display: block; margin-bottom: 8px;
  color: var(--accent); opacity: .4;
}

/* ── Item ── */
.notif-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; cursor: pointer;
  transition: background .15s;
  position: relative;
  border-bottom: 1px solid var(--border-soft);
}
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: var(--bg2); }
.notif-item.no-leida {
  background: var(--accent-soft);
}
.notif-item.no-leida:hover {
  background: color-mix(in srgb, var(--accent) 18%, var(--card));
}
.notif-item.no-leida::before {
  content: '';
  position: absolute; left: 5px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
}

/* ── Avatar ── */
.notif-av {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff;
  overflow: hidden;
}
.notif-av img { width: 100%; height: 100%; object-fit: cover; }

/* ── Badge de tipo ── */
.notif-icono-wrap { position: relative; flex-shrink: 0; }
.notif-icono-badge {
  position: absolute; bottom: -2px; right: -2px;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--card);
}
.notif-icono-badge .material-symbols-outlined { font-size: 10px; }
.tipo-like          .notif-icono-badge { background: #ef4444; color:#fff; }
.tipo-comentario    .notif-icono-badge,
.tipo-respuesta     .notif-icono-badge { background: #3b82f6; color:#fff; }
.tipo-seguidor      .notif-icono-badge { background: #8b5cf6; color:#fff; }
.tipo-mencion       .notif-icono-badge { background: #f59e0b; color:#fff; }
.tipo-repost        .notif-icono-badge { background: #10b981; color:#fff; }
.tipo-admin_post    .notif-icono-badge,
.tipo-admin_aviso   .notif-icono-badge { background: var(--accent); color:#fff; }
.tipo-encuesta      .notif-icono-badge { background: #06b6d4; color:#fff; }

/* ── Texto ── */
.notif-cuerpo { flex: 1; min-width: 0; }
.notif-texto {
  font-size: 13px; line-height: 1.45; color: var(--text);
  margin: 0 0 3px;
}
.notif-texto strong { font-weight: 700; color: var(--text); }
.notif-snippet {
  font-size: 12px; color: var(--text2);
  margin: 0 0 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
}
.notif-tiempo { font-size: 11px; color: var(--text3); }

/* ── No-leída en modo claro: fondo más visible ── */
body:not(.dark-mode) .notif-item.no-leida {
  background: color-mix(in srgb, var(--accent) 10%, #fff);
}
body:not(.dark-mode) .notif-item.no-leida:hover {
  background: color-mix(in srgb, var(--accent) 16%, #fff);
}

@media (max-width: 480px) {
  .notif-panel { top: 56px; right: 8px; width: calc(100vw - 16px); }
}
</style>

<script>
/* Liquid Glass scroll effect — mobile only */
(function () {
  var THRESHOLD = 20;
  var navbar    = null;
  var cleanups  = [];

  function handler() {
    if (!navbar) return;
    var mc  = document.querySelector('.main-content');
    var top = (mc && mc.scrollTop > 0) ? mc.scrollTop : (window.scrollY || 0);
    navbar.classList.toggle('ig-scrolled', top > THRESHOLD);
  }

  function attach() {
    navbar = document.getElementById('main-navbar');
    if (!navbar || window.innerWidth > 768) return;

    var mc = document.querySelector('.main-content');
    var opts = { passive: true };

    if (mc)     { mc.addEventListener('scroll', handler, opts);     cleanups.push(function(){ mc.removeEventListener('scroll', handler, opts); }); }
    window.addEventListener('scroll',   handler, opts);
    document.addEventListener('scroll', handler, opts);
    cleanups.push(function(){ window.removeEventListener('scroll', handler, opts); });
    cleanups.push(function(){ document.removeEventListener('scroll', handler, opts); });

    handler(); /* initial state */
  }

  function detach() {
    cleanups.forEach(function(fn){ fn(); });
    cleanups = [];
    if (navbar) navbar.classList.remove('ig-scrolled');
  }

  function onResize() {
    detach();
    if (window.innerWidth <= 768) attach();
  }

  window.addEventListener('resize', onResize, { passive: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      attach();
      setTimeout(attach, 250); /* re-attach after main-content mounts */
    });
  } else {
    attach();
    setTimeout(attach, 250);
  }
})();

/* ── SUBIR AL INICIO ── */
function subirAlInicio() {
  /* En móvil scroll es body; en PC es html (documentElement) */
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.documentElement.scrollTo({ top: 0, behavior: 'smooth' });
  document.body.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Botón flotante escritorio: aparece al bajar 300px */
(function () {
  var btn = document.getElementById('scroll-top-fab');
  if (!btn) return;
  function getScrollTop() {
    return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  function update() {
    btn.classList.toggle('fab-visible', getScrollTop() > 300);
  }
  window.addEventListener('scroll', update, { passive: true });
  document.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>

<!-- ══ NOTIFICACIONES JS ═════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Estado ── */
  let _notifPanelOpen = false;
  let _notifCache     = [];
  let _pollingTimer   = null;
  let _swRegistered   = false;

  /* ── Iconos por tipo ── */
  const TIPO_META = {
    like:        { icono: 'favorite',        color: '#ef4444', texto: (n) => `<strong>${n.actor_nombre}</strong> le dio like a tu publicación` },
    comentario:  { icono: 'chat_bubble',     color: '#3b82f6', texto: (n) => `<strong>${n.actor_nombre}</strong> comentó en tu publicación` },
    respuesta:   { icono: 'reply',           color: '#3b82f6', texto: (n) => `<strong>${n.actor_nombre}</strong> respondió tu comentario` },
    seguidor:    { icono: 'person_add',      color: '#8b5cf6', texto: (n) => `<strong>${n.actor_nombre}</strong> comenzó a seguirte` },
    mencion:     { icono: 'alternate_email', color: '#f59e0b', texto: (n) => `<strong>${n.actor_nombre}</strong> te mencionó en una publicación` },
    repost:      { icono: 'repeat',          color: '#10b981', texto: (n) => `<strong>${n.actor_nombre}</strong> compartió tu publicación` },
    admin_post:  { icono: 'campaign',        color: 'var(--accent)', texto: (n) => `<strong>${n.actor_nombre}</strong> publicó algo nuevo para la familia` },
    admin_aviso: { icono: 'notification_important', color: 'var(--accent)', texto: (n) => `Aviso importante: ${n.texto_extra || ''}` },
    encuesta:    { icono: 'how_to_vote',     color: '#06b6d4', texto: (n) => `<strong>${n.actor_nombre}</strong> votó en tu encuesta` },
  };

  /* ── Tiempo relativo ── */
  function tiempoRelativo(fechaStr) {
    try {
      const d = new Date(fechaStr.replace(' ', 'T') + 'Z');
      const diff = Math.floor((Date.now() - d.getTime()) / 1000);
      if (diff < 60)   return 'ahora mismo';
      if (diff < 3600) return `hace ${Math.floor(diff/60)} min`;
      if (diff < 86400) return `hace ${Math.floor(diff/3600)} h`;
      return `hace ${Math.floor(diff/86400)} d`;
    } catch { return ''; }
  }

  /* ── Actualizar badges ── */
  function _setBadge(count) {
    ['notif-badge-mob', 'notif-badge-desk'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (count > 0) {
        el.textContent = count > 99 ? '99+' : count;
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    });
    // Móvil: corazón lleno cuando hay notifs, outline cuando no
    const mobIcon = document.getElementById('notif-icon-mob');
    if (mobIcon) mobIcon.textContent = count > 0 ? 'favorite' : 'favorite';
    // Desktop: campana activa cuando hay notifs
    const deskIcon = document.getElementById('notif-icon-desk');
    if (deskIcon) deskIcon.textContent = count > 0 ? 'notifications_active' : 'notifications';
    // Móvil: tinte rosa cuando hay notifs no leídas
    const mobBtn = document.getElementById('notif-bell-mob');
    if (mobBtn) mobBtn.style.color = count > 0 ? 'var(--accent, #ff4d8d)' : '';
    // Tab title badge
    const base = document.title.replace(/^\(\d+\) /, '');
    document.title = count > 0 ? `(${count}) ${base}` : base;
  }

  /* ── Construir HTML de un item ── */
  function _buildItem(n) {
    const meta  = TIPO_META[n.tipo] || { icono: 'circle_notifications', color: '#9ca3af', texto: () => n.texto_extra || n.tipo };
    const texto = meta.texto(n);
    const avatarHTML = n.actor_foto
      ? `<img src="${n.actor_foto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      : `<span style="font-size:15px;font-weight:700;">${(n.actor_nombre||'?')[0].toUpperCase()}</span>`;

    const snippet = n.post_texto
      ? `<p class="notif-snippet">"${n.post_texto}"</p>` : '';

    return `
      <div class="notif-item tipo-${n.tipo} ${n.leida ? '' : 'no-leida'}"
           data-id="${n.id}" data-post="${n.post_id||''}" data-tipo="${n.tipo}"
           onclick="window._notifClick(this)">
        <div class="notif-icono-wrap">
          <div class="notif-av">${avatarHTML}</div>
          <span class="notif-icono-badge">
            <span class="material-symbols-outlined" style="font-size:11px;">${meta.icono}</span>
          </span>
        </div>
        <div class="notif-cuerpo">
          <p class="notif-texto">${texto}</p>
          ${snippet}
          <span class="notif-tiempo">${tiempoRelativo(n.fecha)}</span>
        </div>
      </div>`;
  }

  /* ── Renderizar lista ── */
  function _renderLista(notifs) {
    const lista = document.getElementById('notif-lista');
    if (!lista) return;
    if (!notifs.length) {
      lista.innerHTML = `<div class="notif-vacio"><span class="material-symbols-outlined">notifications_off</span>Sin notificaciones por ahora</div>`;
      return;
    }
    lista.innerHTML = notifs.map(_buildItem).join('');
  }

  /* ── Fetch notificaciones ── */
  async function _fetchNotifs(silent = false) {
    try {
      const r = await fetch('/api/notificaciones', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      if (!r.ok) return;
      const data = await r.json();
      if (!data.ok) return;
      _notifCache = data.notificaciones;
      _setBadge(_notifCache.filter(n => !n.leida).length);

      // Mostrar push-notification del navegador para nuevas no leídas
      if (!silent && Notification.permission === 'granted') {
        _pushNuevas(data.notificaciones);
      }

      if (_notifPanelOpen) _renderLista(_notifCache);
    } catch {}
  }

  /* ── Push: notificar solo las nuevas desde la última revisión ── */
  let _lastNotifId = 0;
  function _pushNuevas(notifs) {
    const nuevas = notifs.filter(n => !n.leida && n.id > _lastNotifId);
    if (nuevas.length && _lastNotifId > 0) {
      nuevas.slice(0, 3).forEach(n => {
        const meta = TIPO_META[n.tipo] || { icono: 'notifications', texto: () => n.texto_extra };
        try {
          new Notification('FamilyApp', {
            body:    meta.texto(n).replace(/<[^>]+>/g, ''),
            icon:    '/static/icono/icono.png',
            tag:     `notif-${n.id}`,
            silent:  false,
          });
        } catch {}
      });
    }
    if (notifs.length) _lastNotifId = Math.max(_lastNotifId, ...notifs.map(n => n.id));
  }

  /* ── Polling liviano cada 45 seg ── */
  async function _pollConteo() {
    try {
      const r = await fetch('/api/notificaciones/no_leidas', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      if (!r.ok) return;
      const d = await r.json();
      if (d.count !== undefined) _setBadge(d.count);
    } catch {}
  }

  function _startPolling() {
    if (_pollingTimer) return;
    _pollingTimer = setInterval(_pollConteo, 45000);
  }

  /* ── Pedir permiso de notificaciones ── */
  async function _pedirPermiso() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  }

  /* ── Service Worker (push en background) ── */
  function _registrarSW() {
    if (_swRegistered || !('serviceWorker' in navigator)) return;
    _swRegistered = true;
    // Inline SW para no depender de archivos externos
    const swCode = `
self.addEventListener('push', e => {
  const d = e.data ? e.data.json() : { title: 'FamilyApp', body: 'Nueva notificación' };
  e.waitUntil(self.registration.showNotification(d.title || 'FamilyApp', {
    body: d.body || '',
    icon: '/static/icono/icono.png',
    badge: '/static/icono/icono.png',
  }));
});
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow('/dashboard'));
});
`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, { scope: '/' })
      .then(() => { URL.revokeObjectURL(swUrl); })
      .catch(() => {});
  }

  /* ── Toggle panel ── */
  window.toggleNotifPanel = function () {
    if (_notifPanelOpen) { cerrarNotifPanel(); return; }
    const panel   = document.getElementById('notif-panel');
    const overlay = document.getElementById('notif-overlay');
    if (!panel) return;
    _notifPanelOpen = true;
    panel.style.display   = 'flex';
    overlay.style.display = 'block';
    document.getElementById('notif-lista').innerHTML =
      '<div class="notif-loading"><span class="material-symbols-outlined spin">refresh</span></div>';
    _fetchNotifs(true).then(() => _renderLista(_notifCache));
  };

  window.cerrarNotifPanel = function () {
    const panel   = document.getElementById('notif-panel');
    const overlay = document.getElementById('notif-overlay');
    if (panel)   panel.style.display   = 'none';
    if (overlay) overlay.style.display = 'none';
    _notifPanelOpen = false;
  };

  /* ── Marcar todas leídas ── */
  window.marcarTodasLeidas = async function () {
    try {
      await fetch('/api/notificaciones/marcar_leidas', { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      _notifCache.forEach(n => n.leida = true);
      _setBadge(0);
      _renderLista(_notifCache);
    } catch {}
  };

  /* ── Click en item ── */
  window._notifClick = async function (el) {
    const nid    = el.dataset.id;
    const postId = el.dataset.post;
    const tipo   = el.dataset.tipo;
    // Marcar como leída
    if (el.classList.contains('no-leida')) {
      el.classList.remove('no-leida');
      try {
        await fetch(`/api/notificaciones/marcar_una/${nid}`, { method: 'POST' });
        const noLeidas = _notifCache.filter(n => !n.leida).length;
        _setBadge(noLeidas > 0 ? noLeidas : 0);
      } catch {}
    }
    cerrarNotifPanel();
    // Navegar al contenido relevante
    if (postId) {
      if (typeof irSeccion === 'function') irSeccion('inicio');
      setTimeout(() => {
        const card = document.getElementById('post-' + postId);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.style.outline = '2px solid var(--accent,#ff4d8d)';
          setTimeout(() => { card.style.outline = ''; }, 2000);
        }
      }, 400);
    } else if (tipo === 'seguidor') {
      if (typeof irSeccion === 'function') irSeccion('perfil');
    }
  };

  /* ── Init al cargar la página ── */
  document.addEventListener('DOMContentLoaded', () => {
    // Fetch inicial al cargar (sin push — silencioso)
    _fetchNotifs(true).then(() => {
      // Después del primer fetch, establecemos el ID base para detectar nuevas
      if (_notifCache.length) _lastNotifId = Math.max(..._notifCache.map(n => n.id));
    });
    _startPolling();
    // Pedir permiso de notificaciones (no invasivo — solo si no decidió antes)
    setTimeout(_pedirPermiso, 3000);
    _registrarSW();
  });

  /* ── Cerrar con Escape ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && _notifPanelOpen) cerrarNotifPanel();
  });

})();
</script>

<!-- ══ PULL TO REFRESH — solo móvil ════════════════════════════════════════ -->
<style>
/* Indicador pull-to-refresh */
#ptr-indicator {
  display: none;
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%) translateY(-100%);
  z-index: 2000;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transition: transform 0.15s ease;
  pointer-events: none;
}
#ptr-indicator .material-symbols-outlined {
  font-size: 22px;
  color: var(--accent, #ff4d8d);
  transition: transform 0.2s ease;
  display: block;
}
#ptr-indicator.ptr-pulling {
  display: flex;
}
#ptr-indicator.ptr-ready .material-symbols-outlined {
  color: #4ade80;
}
#ptr-indicator.ptr-loading .material-symbols-outlined {
  animation: ptr-spin 0.7s linear infinite;
}
@keyframes ptr-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Solo se muestra en móvil */
@media (min-width: 769px) {
  #ptr-indicator { display: none !important; }
}
</style>

<!-- El círculo indicador -->
<div id="ptr-indicator" aria-hidden="true">
  <span class="material-symbols-outlined" id="ptr-icon">arrow_downward</span>
</div>

<script>
/* ══ Pull-to-Refresh — solo pantallas ≤ 768px ═══════════════════════════════
   Funciona tanto en browser como en APK/WebView donde no hay pull nativo.
   ─────────────────────────────────────────────────────────────────────────── */
(function () {
  'use strict';

  if (window.innerWidth > 768) return; // Solo móvil

  var PTR_THRESHOLD   = 80;   // px que hay que bajar para activar
  var PTR_MAX_PULL    = 120;  // máximo desplazamiento visual
  var PTR_RESISTANCE  = 0.4;  // cuánto "cuesta" tirar (0.4 = amortiguado)

  var indicator = document.getElementById('ptr-indicator');
  var icon      = document.getElementById('ptr-icon');

  var startY    = 0;
  var currentY  = 0;
  var pulling   = false;
  var loading   = false;

  /* Saber si el scroll está en el tope */
  function isAtTop() {
    var mc = document.querySelector('.main-content');
    if (mc && mc.scrollTop > 2) return false;
    return (window.scrollY || document.documentElement.scrollTop || document.body.scrollTop) < 2;
  }

  /* Mover el indicador visualmente */
  function setIndicatorPos(py) {
    var raw      = py * PTR_RESISTANCE;
    var clamped  = Math.min(raw, PTR_MAX_PULL);
    var progress = Math.min(clamped / PTR_THRESHOLD, 1);

    indicator.style.display = 'flex';
    indicator.style.transform = 'translateX(-50%) translateY(' + (clamped - 44) + 'px)';

    // Rotar flecha según progreso
    icon.style.transform = 'rotate(' + (progress * 180) + 'deg)';

    if (progress >= 1) {
      indicator.classList.add('ptr-ready');
      icon.textContent = 'refresh';
    } else {
      indicator.classList.remove('ptr-ready');
      icon.textContent = 'arrow_downward';
    }
  }

  function resetIndicator() {
    indicator.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    indicator.style.opacity    = '0';
    indicator.style.transform  = 'translateX(-50%) translateY(-60px)';
    setTimeout(function () {
      indicator.style.display    = 'none';
      indicator.style.transition = '';
      indicator.style.opacity    = '1';
      indicator.classList.remove('ptr-pulling', 'ptr-ready', 'ptr-loading');
      icon.style.transform = '';
    }, 300);
  }

  function showLoading() {
    indicator.style.display   = 'flex';
    indicator.style.transform = 'translateX(-50%) translateY(12px)';
    indicator.classList.add('ptr-loading');
    icon.textContent          = 'refresh';
    icon.style.transform      = '';
  }

  function doRefresh() {
    if (loading) return;
    loading = true;
    showLoading();
    // Pequeño delay para que se vea el spinner, luego recarga
    setTimeout(function () {
      location.reload();
    }, 600);
  }

  /* ── Touch handlers ── */
  document.addEventListener('touchstart', function (e) {
    if (loading) return;
    if (!isAtTop()) return;
    startY  = e.touches[0].clientY;
    pulling = false;
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (loading) return;
    if (!isAtTop()) return;
    currentY = e.touches[0].clientY;
    var dy   = currentY - startY;
    if (dy <= 0) return;

    pulling = true;
    indicator.classList.add('ptr-pulling');
    setIndicatorPos(dy);
  }, { passive: true });

  document.addEventListener('touchend', function () {
    if (loading || !pulling) return;
    var dy = currentY - startY;
    pulling = false;
    if (dy * PTR_RESISTANCE >= PTR_THRESHOLD) {
      doRefresh();
    } else {
      resetIndicator();
    }
  }, { passive: true });

  /* ── Resize: desactivar si rotan a landscape > 768px ── */
  window.addEventListener('resize', function () {
    if (window.innerWidth > 768) {
      resetIndicator();
    }
  }, { passive: true });

})();
</script>
