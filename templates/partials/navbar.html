<nav class="navbar" id="main-navbar">

  <!-- ── MÓVIL: Liquid Glass Instagram style ── -->
  <div class="navbar-mobile-ig">
    <div class="navbar-ig-left">
      <span class="navbar-ig-brand">
        <span class="brand-pink">FAMILLY</span><span class="brand-white">APP</span>
      </span>
    </div>
    <div class="navbar-ig-right">
      <button class="navbar-ig-btn" title="Notificaciones" aria-label="Notificaciones">
        <span class="material-symbols-outlined">favorite</span>
      </button>
      <button class="navbar-ig-btn" onclick="irSeccion('buscador')" title="Buscar" aria-label="Buscar">
        <span class="material-symbols-outlined">search</span>
      </button>
    </div>
  </div>

  <!-- ── ESCRITORIO: layout original ── -->
  <div class="navbar-left navbar-desktop-only">
    <button id="menu-toggle" onclick="toggleSidebar()" class="hamburger-btn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <span class="navbar-title" id="nav-title">Inicio</span>
  </div>
  <div class="navbar-right navbar-desktop-only">
    <button class="nav-icon-btn" onclick="irSeccion('buscador')" title="Buscar">
      <span class="material-symbols-outlined">search</span>
    </button>
    <span class="navbar-date">{{ ahora }}</span>
    <img src="{{ usuario.foto or '' }}" class="user-avatar-img navbar-av-img"
         style="cursor:pointer;{{ '' if usuario.foto else 'display:none;' }}"
         onclick="irSeccion('perfil')" alt="perfil">
    <div class="user-avatar navbar-av-letter"
         style="cursor:pointer;{{ 'display:none;' if usuario.foto else '' }}"
         onclick="irSeccion('perfil')">{{ usuario.nombre[0]|upper }}</div>
  </div>
</nav>

<script>
/* Liquid Glass scroll effect — mobile only */
(function () {
  var THRESHOLD = 20;
  var navbar    = null;
  var cleanups  = [];

  function handler() {
    if (!navbar) return;
    var mc  = document.querySelector('.main-content');
    var top = (mc && mc.scrollTop > 0) ? mc.scrollTop : (window.scrollY || 0);
    navbar.classList.toggle('ig-scrolled', top > THRESHOLD);
  }

  function attach() {
    navbar = document.getElementById('main-navbar');
    if (!navbar || window.innerWidth > 768) return;

    var mc = document.querySelector('.main-content');
    var opts = { passive: true };

    if (mc)     { mc.addEventListener('scroll', handler, opts);     cleanups.push(function(){ mc.removeEventListener('scroll', handler, opts); }); }
    window.addEventListener('scroll',   handler, opts);
    document.addEventListener('scroll', handler, opts);
    cleanups.push(function(){ window.removeEventListener('scroll', handler, opts); });
    cleanups.push(function(){ document.removeEventListener('scroll', handler, opts); });

    handler(); /* initial state */
  }

  function detach() {
    cleanups.forEach(function(fn){ fn(); });
    cleanups = [];
    if (navbar) navbar.classList.remove('ig-scrolled');
  }

  function onResize() {
    detach();
    if (window.innerWidth <= 768) attach();
  }

  window.addEventListener('resize', onResize, { passive: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      attach();
      setTimeout(attach, 250); /* re-attach after main-content mounts */
    });
  } else {
    attach();
    setTimeout(attach, 250);
  }
})();
</script>
