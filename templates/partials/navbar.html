<!-- SVG Liquid Glass Distortion Filter — renders off-screen, used by CSS filter -->
<svg width="0" height="0" style="position:absolute;pointer-events:none;overflow:hidden;" aria-hidden="true">
  <defs>
    <filter id="lg-distort-header" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="2" seed="47" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="1.5" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="28" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="lg-distort-nav" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.018" numOctaves="2" seed="92" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="1.2" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="22" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Botón flotante "subir" — solo escritorio -->
<button id="scroll-top-fab" onclick="subirAlInicio()" title="Volver al inicio" aria-label="Volver al inicio">
  <span class="material-symbols-outlined">keyboard_arrow_up</span>
</button>

<style>
#scroll-top-fab {
  display: none;
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #ff4d8d;
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(255,77,141,.45);
  z-index: 999;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .22s, transform .22s;
}
#scroll-top-fab .material-symbols-outlined { font-size: 26px; line-height: 1; }
#scroll-top-fab.fab-visible {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
#scroll-top-fab:hover { background: #e03070; transform: translateY(-2px); }
@media (max-width: 768px) { #scroll-top-fab { display: none !important; } }
</style>

<script>
/* Liquid Glass scroll effect — mobile only */
(function () {
  var THRESHOLD = 20;
  var navbar    = null;
  var cleanups  = [];

  function handler() {
    if (!navbar) return;
    var mc  = document.querySelector('.main-content');
    var top = (mc && mc.scrollTop > 0) ? mc.scrollTop : (window.scrollY || 0);
    navbar.classList.toggle('ig-scrolled', top > THRESHOLD);
  }

  function attach() {
    navbar = document.getElementById('main-navbar');
    if (!navbar || window.innerWidth > 768) return;

    var mc = document.querySelector('.main-content');
    var opts = { passive: true };

    if (mc)     { mc.addEventListener('scroll', handler, opts);     cleanups.push(function(){ mc.removeEventListener('scroll', handler, opts); }); }
    window.addEventListener('scroll',   handler, opts);
    document.addEventListener('scroll', handler, opts);
    cleanups.push(function(){ window.removeEventListener('scroll', handler, opts); });
    cleanups.push(function(){ document.removeEventListener('scroll', handler, opts); });

    handler(); /* initial state */
  }

  function detach() {
    cleanups.forEach(function(fn){ fn(); });
    cleanups = [];
    if (navbar) navbar.classList.remove('ig-scrolled');
  }

  function onResize() {
    detach();
    if (window.innerWidth <= 768) attach();
  }

  window.addEventListener('resize', onResize, { passive: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      attach();
      setTimeout(attach, 250); /* re-attach after main-content mounts */
    });
  } else {
    attach();
    setTimeout(attach, 250);
  }
})();

/* ── SUBIR AL INICIO ── */
function subirAlInicio() {
  /* En móvil scroll es body; en PC es html (documentElement) */
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.documentElement.scrollTo({ top: 0, behavior: 'smooth' });
  document.body.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Botón flotante escritorio: aparece al bajar 300px */
(function () {
  var btn = document.getElementById('scroll-top-fab');
  if (!btn) return;
  function getScrollTop() {
    return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  function update() {
    btn.classList.toggle('fab-visible', getScrollTop() > 300);
  }
  window.addEventListener('scroll', update, { passive: true });
  document.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
