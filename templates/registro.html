<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Familia App — Crear cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --border: #dbdbdb;
      --text: #262626;
      --text2: #737373;
      --text3: #c7c7c7;
      --accent: #0095f6;
      --btn-bg: #0095f6;
      --font: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .ig-wrapper {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ig-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 32px 40px 24px;
    }

    .ig-brand {
      text-align: center;
      margin-bottom: 20px;
    }
    .ig-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      margin-bottom: 12px;
    }
    .ig-logo .material-symbols-outlined {
      font-size: 28px;
      color: #fff;
      font-variation-settings: 'FILL' 1;
    }
    .ig-brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text);
      line-height: 1;
    }
    .ig-brand-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 6px;
      font-weight: 500;
      line-height: 1.4;
      padding: 0 10px;
    }

    .ig-alert {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .ig-alert .material-symbols-outlined { font-size: 16px; flex-shrink: 0; }

    .ig-form { display: flex; flex-direction: column; gap: 6px; }

    .ig-input-wrap { position: relative; }
    .ig-input-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text3);
      font-size: 18px;
    }
    .ig-input {
      width: 100%;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px 9px 40px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .ig-input::placeholder { color: var(--text3); font-size: 12px; }
    .ig-input:focus { border-color: #a8a8a8; }

    .ig-btn {
      width: 100%;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }
    .ig-btn:hover { opacity: .88; }

    .ig-terms {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }
    .ig-terms a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .ig-divider {
      display: flex; align-items: center; gap: 14px;
      margin: 14px 0 10px;
    }
    .ig-divider::before, .ig-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .ig-divider span {
      font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: .5px;
    }

    .ig-bottom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--text2);
    }
    .ig-bottom a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      margin-left: 4px;
    }
    .ig-bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="ig-wrapper">
  <div class="ig-card">

    <div class="ig-brand">
      <div class="ig-logo">
        <span class="material-symbols-outlined">home</span>
      </div>
      <div class="ig-brand-name">FAMILIA</div>
      <div class="ig-brand-sub">Regístrate para ver fotos y momentos de la familia.</div>
    </div>

    {% if error %}
    <div class="ig-alert">
      <span class="material-symbols-outlined">warning</span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="ig-form">

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">badge</span>
        <input name="nombre" type="text" class="ig-input" placeholder="Nombre completo" required autocomplete="name"/>
      </div>

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">alternate_email</span>
        <input name="usuario" type="text" class="ig-input" placeholder="Usuario" required autocomplete="username"/>
      </div>

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">mail</span>
        <input name="gmail" type="email" class="ig-input" placeholder="Correo electrónico" required autocomplete="email"/>
      </div>

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">lock</span>
        <input name="password" type="password" class="ig-input" placeholder="Contraseña" required autocomplete="new-password" minlength="8"/>
      </div>

      <div class="ig-input-wrap">
        <span class="material-symbols-outlined ig-input-icon">lock_reset</span>
        <input name="confirmar" type="password" class="ig-input" placeholder="Confirmar contraseña" required autocomplete="new-password"/>
      </div>

      <button type="submit" class="ig-btn">Registrarse</button>
    </form>

    <p class="ig-terms">
      Al registrarte, aceptas nuestros <a href="#">Términos</a> y confirmas que has leído nuestra <a href="#">Política de privacidad</a>.
    </p>

  </div>

  <div class="ig-bottom">
    ¿Ya tienes cuenta?<a href="/">Inicia sesión</a>
  </div>
</div>

</body>
</html>
